name: Refresh Audit Data

on:
  workflow_dispatch:
  schedule:
    - cron: "0 5 * * *"   # daily 05:00 UTC

jobs:
  regenerate:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: |
          pip install --quiet \
            google-ads==29.2.0 \
            requests

      - name: Generate index.html
        env:
          GADS_CLIENT_ID:     ${{ secrets.GADS_CLIENT_ID }}
          GADS_CLIENT_SECRET: ${{ secrets.GADS_CLIENT_SECRET }}
          GADS_DEV_TOKEN:     ${{ secrets.GADS_DEV_TOKEN }}
          GADS_REFRESH_TOKEN: ${{ secrets.GADS_REFRESH_TOKEN }}
          GADS_LOGIN_CID:     ${{ secrets.GADS_LOGIN_CID }}
          POSTHOG_KEY:        ${{ secrets.POSTHOG_KEY }}
          POSTHOG_PID:        ${{ secrets.POSTHOG_PID }}
          GH_TOKEN_B64:       ${{ secrets.GH_TOKEN_B64 }}
        run: python scripts/generate.py

      - name: Commit & push updated report
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add index.html
          git diff --cached --quiet || git commit -m "chore: refresh audit data $(date -u '+%Y-%m-%d %H:%M UTC')"
          git push
